name: cd-core

on:
  workflow_dispatch:
    inputs:
      bal_central_environment:
        description: Ballerina Central Environment
        type: choice
        options:
          - STAGE
          - DEV
          - PROD
        required: true

env:
  BALLERINA_VERSION: 2201.12.10

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      JAVA_OPTS: -Xmx4G
    steps:
      - uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v2
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Setup latest Ballerina version
        uses: ballerina-platform/setup-ballerina@v1.1.0
        with:
          version: ${{ env.BALLERINA_VERSION }}

      - name: Run gradle build for staging
        if: inputs.bal_central_environment == 'STAGE'
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
          BALLERINA_STAGE_CENTRAL: true
          BALLERINA_CENTRAL_ACCESS_TOKEN: ${{ secrets.BALLERINA_CENTRAL_STAGE_ACCESS_TOKEN }}
        run: |
          pushd core
          ./gradlew build balPack -x test
          popd

      - name: Run gradle build for dev
        if: inputs.bal_central_environment == 'DEV'
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
          BALLERINA_DEV_CENTRAL: true
          BALLERINA_CENTRAL_ACCESS_TOKEN: ${{ secrets.BALLERINA_CENTRAL_DEV_ACCESS_TOKEN }}
        run: |
          pushd core
          ./gradlew build balPack -x test
          popd

      - name: Run gradle build for prod
        if: inputs.bal_central_environment == 'PROD'
        env:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pushd core
          ./gradlew build balPack -x test
          popd

      - name: Push to Staging
        if: inputs.bal_central_environment == 'STAGE'
        working-directory: core/ballerina
        run: bal push
        env:
          BALLERINA_STAGE_CENTRAL: true
          BALLERINA_CENTRAL_ACCESS_TOKEN: ${{ secrets.BALLERINA_CENTRAL_STAGE_ACCESS_TOKEN }}

      - name: Push to Dev
        if: inputs.bal_central_environment == 'DEV'
        working-directory: core/ballerina
        run: bal push
        env:
          BALLERINA_DEV_CENTRAL: true
          BALLERINA_CENTRAL_ACCESS_TOKEN: ${{ secrets.BALLERINA_CENTRAL_DEV_ACCESS_TOKEN }}

      - name: Push to Prod
        if: inputs.bal_central_environment == 'PROD'
        working-directory: core/ballerina
        run: bal push
        env:
          BALLERINA_CENTRAL_ACCESS_TOKEN: ${{ secrets.BALLERINA_CENTRAL_ACCESS_TOKEN }}

      - name: Publish Release
        if: inputs.bal_central_environment == 'PROD'
        id: publish_release
        run: |
          # Get Branch Name
          BRANCH_NAME=$(echo ${GITHUB_REF#refs/heads/})
          echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_OUTPUT
          # Release name
          RELEASE_NAME=${BRANCH_NAME#release-}
          curl \
            -s -X POST \
            -H "Authorization: Bearer ${{ secrets.BALLERINA_BOT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{
              "tag_name": "'$RELEASE_NAME'",
              "name": "'$RELEASE_NAME'",
              "body": "[Automated] Creating tag:  '$RELEASE_NAME'.",
              "draft": false,
              "prerelease": false,
              "target_commitish": "'$BRANCH_NAME'"
            }' \
            "https://api.github.com/repos/${{ github.repository }}/releases"

      - name: Update version in Ballerina.toml and gradle.properties
        if: ${{ inputs.bal_central_environment == 'PROD' }}
        id: increment_patch_version
        run: |
          CURRENT_VERSION=$(grep -Po -m 1 '(?<=version=)[\d.]+' core/gradle.properties)
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          PATCH_VERSION=$((VERSION_PARTS[2] + 1))
          NEW_VERSION="${VERSION_PARTS[0]}.${VERSION_PARTS[1]}.$PATCH_VERSION"
          sed -i "0,/version=${CURRENT_VERSION}/s//version=${NEW_VERSION}/" core/gradle.properties
          sed -i "0,/version = \"${CURRENT_VERSION}\"/s//version = \"${NEW_VERSION}\"/" core/ballerina/Ballerina.toml
          # Update jar paths
          sed -i "s/dicom-native-${CURRENT_VERSION}.jar/dicom-native-${NEW_VERSION}.jar/g" core/ballerina/Ballerina.toml
          echo "NEW_VERSION=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "CURRENT_VERSION=${CURRENT_VERSION}" >> $GITHUB_OUTPUT

      - name: Commit changes and make a PR
        if: ${{ inputs.bal_central_environment == 'PROD' }}
        run: |
          packageName="core"

          # Commit changes
          git config --global user.name ${{ secrets.BALLERINA_BOT_USERNAME }}
          git config --global user.email ${{ secrets.BALLERINA_BOT_EMAIL }}
          git add core/gradle.properties
          git add core/ballerina/Ballerina.toml
          if [ -f "core/ballerina/Dependencies.toml" ]; then
            git add core/ballerina/Dependencies.toml
          fi
          git commit -m "[Release ${packageName} ${{ steps.increment_patch_version.outputs.CURRENT_VERSION }}] Prepare for next dev cycle"
          git push origin ${{ steps.publish_release.outputs.BRANCH_NAME }}

          BASE_BRANCH="main"
          HEAD_BRANCH="${{ steps.publish_release.outputs.BRANCH_NAME }}"
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.BALLERINA_BOT_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{
              "title": "[Release '"$packageName"' ${{ steps.increment_patch_version.outputs.CURRENT_VERSION }}] Prepare for next dev cycle",
              "body": "",
              "head": "'"$HEAD_BRANCH"'",
              "base": "'"$BASE_BRANCH"'"
            }' \
            "https://api.github.com/repos/${{ github.repository }}/pulls")
          PR_URL=$(echo "$RESPONSE" | jq -r '.html_url')

          echo "Pull Request created: $PR_URL"
